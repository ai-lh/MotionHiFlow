  - dataset_module@val_dataset: t2m_t2m
  - dataset_module@eval_dataset: t2m_eval
  - dataset_module@test_dataset: t2m_eval
  - default

meta:
  joints: 22
  nfeats: 263
  hijoints: [22, 14, 6]

data_root: datasets/humanml3d
eval_mean: ${resources.eval_mean.t2m}
eval_std: ${resources.eval_std.t2m}
dataset_name: t2m

train_dataset:
  split_file: ${data.data_root}/train.txt
val_dataset:
  split_file: ${data.data_root}/val.txt
eval_dataset:
  split_file: ${data.data_root}/val.txt
test_dataset:
  split_file: ${data.data_root}/test.txt

eval_collate_fn:
  _target_: src.data.t2m_dataset.collate_fn
  _partial_: True